<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | Digital Hostess</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://i4m.shift4test.com/js/jquery.i4goTrueToken.js"></script>
    <style>
        :root { --primary: #2ecc71; --error: #e74c3c; --bg: #f4f4f7; --text: #111; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; transition: opacity 0.3s ease; }
        .spinner { width: 50px; height: 50px; border: 5px solid #eee; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .checkout-container { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 480px; width: 100%; position: relative; }
        h1 { font-size: 22px; color: var(--text); margin-bottom: 20px; text-align: center; font-weight: 700; }
        #error-display { display: none; background: #fdf0f0; border: 1px solid var(--error); color: var(--error); padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; text-align: center; line-height: 1.4; }
        .order-summary { background: #fafafa; border: 1px solid #eee; border-radius: 12px; padding: 20px; margin-bottom: 25px; }
        .item-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 15px; color: #333; }
        .total-row { display: flex; justify-content: space-between; margin-top: 15px; padding-top: 15px; border-top: 2px solid #eee; font-weight: 800; font-size: 20px; color: var(--primary); }
        #i4goFrame { width: 100%; min-height: 380px; border: none; border-radius: 8px; }
        #success-ui { display: none; text-align: center; padding: 40px 0; }
        .success-icon { font-size: 64px; color: var(--primary); margin-bottom: 20px; }
    </style>
</head>
<body>
<div id="initial-loader" class="loader-overlay"><div class="spinner"></div><p>Loading your order details...</p></div>
<div id="payment-loader" class="loader-overlay" style="display: none;"><div class="spinner"></div><p>Processing your payment securely...</p></div>
<div class="checkout-container">
    <div id="payment-ui">
        <h1>Complete Your Order</h1>
        <div id="error-display"></div>
        <div class="order-summary">
            <div id="items-list"></div>
            <div class="total-row"><span>Total</span><span id="display-total">$0.00</span></div>
        </div>
        <div id="i4goFrame"></div>
    </div>
    <div id="success-ui">
        <div class="success-icon">✓</div>
        <h1>Order Confirmed!</h1>
        <p>Your receipt and order have been sent to the kitchen.</p>
    </div>
</div>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('id');
    let orderData = null;

    function showError(msg) {
        const errBox = document.getElementById('error-display');
        errBox.innerText = msg;
        errBox.style.display = 'block';
        errBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function hideError() {
        document.getElementById('error-display').style.display = 'none';
    }

    async function initializeCheckout() {
        if (!orderId) {
            document.getElementById('initial-loader').innerHTML = "<p>Error: No Order ID provided.</p>";
            return;
        }
        try {
            if (!orderData) {
                const response = await fetch(`https://hook.us2.make.com/lq54xriqlh8eyrsiihc58i5ga4kc45ry?id=${orderId}`);
                orderData = await response.json();
            }
            const amountVal = parseFloat(orderData.totalAmount);
            const displayVal = amountVal > 1000 ? (amountVal / 100) : amountVal;
            document.getElementById('display-total').innerText = `$${displayVal.toFixed(2)}`;
            let itemsHtml = '';
            const orderItems = typeof orderData.items === 'string' ? JSON.parse(orderData.items) : orderData.items;
            if (orderItems && orderItems.lineItems) {
                orderItems.lineItems.forEach(item => {
                    itemsHtml += `<div class="item-row"><span>${item.quantity}x ${item.name}</span><span>$${(item.total / 100).toFixed(2)}</span></div>`;
                });
                document.getElementById('items-list').innerHTML = itemsHtml;
            }
            
            $("#i4goFrame").empty(); // Clear old frames to unlock the UI

            $("#i4goFrame").i4goTrueToken({
                url: orderData.i4goUrl,
                server: orderData.i4goServer,
                accessBlock: orderData.accessBlock,
                template: "bootstrap4",
                submitButton: { label: "Pay Now" },
                self: document.location,
                frameAutoResize: true,
                onSuccess: function(form, response) {
                    hideError();
                    document.getElementById('payment-loader').style.display = 'flex';
                    let month = (response.i4go_expirationmonth || "").toString().padStart(2, '0');
                    let year = (response.i4go_expirationyear || "").toString().slice(-2);
                    let formattedExp = (month && year) ? (month + year) : "";
                    
                    fetch('https://hook.us2.make.com/998kdfnczir9vgihp4wbny8ollf80px1', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            tokenId: response.i4go_uniqueid,
                            expirationDate: formattedExp,
                            totalAmount: Math.round(amountVal < 1000 ? amountVal * 100 : amountVal),
                            invoiceId: orderId
                        })
                    })
                    .then(async (res) => {
                        const resultData = await res.json();
                        if (resultData.status === 'success') {
                            document.getElementById('payment-loader').style.display = 'none';
                            document.getElementById('payment-ui').style.display = 'none';
                            document.getElementById('success-ui').style.display = 'block';
                        } else {
                            document.getElementById('payment-loader').style.display = 'none';
                            showError("Payment Issue: " + (resultData.message || "Card declined."));
                            initializeCheckout(); // Re-initialize to unlock frame
                        }
                    })
                    .catch((err) => {
                        document.getElementById('payment-loader').style.display = 'none';
                        showError("The request timed out. No charge was made. Please try again.");
                        initializeCheckout();
                    });
                },
                onFailure: function(form, response) {
                    document.getElementById('payment-loader').style.display = 'none';
                    showError("Invalid Entry: " + (response.i4go_responsetext || "Check card details."));
                }
            });
            document.getElementById('initial-loader').style.opacity = '0';
            setTimeout(() => document.getElementById('initial-loader').style.display = 'none', 300);
        } catch (err) {
            document.getElementById('initial-loader').innerHTML = "<p>Connection error. Please refresh.</p>";
        }
    }
    initializeCheckout();
</script>
</body>
</html>
