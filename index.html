<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | Digital Hostess</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://i4m.shift4test.com/js/jquery.i4goTrueToken.js"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f9f9f9; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 450px; width: 100%; text-align: center; }
        h1 { font-size: 24px; color: #1a1a1a; margin-bottom: 8px; }
        .amount { font-size: 32px; font-weight: bold; margin: 15px 0; color: #2ecc71; }
        .items-list { text-align: left; background: #fcfcfc; border: 1px solid #eee; border-radius: 8px; padding: 15px; margin-bottom: 20px; font-size: 14px; color: #444; }
        .item-row { display: flex; justify-content: space-between; font-weight: 600; margin-top: 10px; }
        #i4goFrame { width: 100%; min-height: 350px; margin-top: 20px; border-radius: 8px; overflow: hidden; }
        #success-container { display: none; padding: 40px 20px; }
        .checkmark { font-size: 60px; color: #2ecc71; }
    </style>
</head>
<body>

<div class="card">
    <div id="order-ui">
        <h1>Complete Your Order</h1>
        <p id="customer-name">Loading order details...</p>
        <div id="items-container" class="items-list" style="display:none;">
            <h3>Your Items</h3>
            <div id="items-content"></div>
        </div>
        <div id="order-total" class="amount">$0.00</div>
        <div id="i4goFrame"></div>
    </div>

    <div id="success-container">
        <div class="checkmark">✓</div>
        <h1>Order Placed!</h1>
        <p>This order has been processed and sent to the kitchen. Thank you!</p>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('id');

    async function loadOrder() {
        if (!orderId) return;

        try {
            const response = await fetch(`https://hook.us2.make.com/lq54xriqlh8eyrsiihc58i5ga4kc45ry?id=${orderId}`);
            const data = await response.json();

            document.getElementById('customer-name').innerText = `For ${data.customerName}`;
            document.getElementById('order-total').innerText = `$${(data.totalAmount / 100).toFixed(2)}`;

            // Build Receipt logic
            let orderData = data.items;
            if (typeof orderData === 'string') orderData = JSON.parse(orderData);
            if (orderData && orderData.lineItems) {
                const content = document.getElementById('items-content');
                orderData.lineItems.forEach(item => {
                    content.innerHTML += `<div class="item-row"><span>${item.quantity}x ${item.name}</span><span>$${(item.price / 100).toFixed(2)}</span></div>`;
                });
                document.getElementById('items-container').style.display = 'block';
            }

            // Initialize i4Go with required 'self' parameter
            $("#i4goFrame").i4goTrueToken({
                url: data.i4goUrl,
                server: data.i4goServer,
                accessBlock: data.accessBlock,
                template: "bootstrap4",
                submitButton: { label: "Place Order" },
                self: document.location, // The missing piece
                onSuccess: function(form, response) {
                    document.getElementById('order-ui').style.display = 'none';
                    document.getElementById('success-container').style.display = 'block';

                    // Legacy Expiration Formatting
                    let month = (response.i4go_expirationmonth || "").toString().padStart(2, '0');
                    let year = (response.i4go_expirationyear || "").toString().slice(-2);
                    let formattedExp = (month && year) ? (month + year) : "";

                    fetch('https://hook.us2.make.com/998kdfnczir9vgihp4wbny8ollf80px1', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            tokenId: response.i4go_uniqueid,
                            expirationDate: formattedExp, 
                            totalAmount: (data.totalAmount / 100).toFixed(2), 
                            invoiceId: orderId
                        })
                    });
                },
                onFailure: function(form, response) {
                    alert("Payment Error: " + response.i4go_responsetext);
                }
            });
        } catch (error) { console.error("Order Load Failed:", error); }
    }
    loadOrder();
</script>
</body>
</html>
