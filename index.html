<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | Digital Hostess</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://i4m.shift4test.com/js/jquery.i4goTrueToken.js"></script>
    
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #f4f4f7; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .checkout-container { 
            background: white; 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            max-width: 480px; 
            width: 100%; 
        }
        h1 { font-size: 22px; color: #111; margin-bottom: 20px; text-align: center; font-weight: 700; }
        .order-summary { 
            background: #fafafa; 
            border: 1px solid #eee; 
            border-radius: 12px; 
            padding: 20px; 
            margin-bottom: 25px; 
        }
        .summary-header { border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px; font-weight: 600; color: #555; font-size: 14px; }
        .item-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 15px; color: #333; }
        .total-row { 
            display: flex; 
            justify-content: space-between; 
            margin-top: 15px; 
            padding-top: 15px; 
            border-top: 2px solid #eee; 
            font-weight: 800; 
            font-size: 20px; 
            color: #2ecc71; 
        }
        #i4goFrame { width: 100%; min-height: 380px; border: none; border-radius: 8px; }
        #success-ui { display: none; text-align: center; padding: 40px 0; }
        .success-icon { font-size: 64px; color: #2ecc71; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="checkout-container">
    <div id="payment-ui">
        <h1>Complete Your Order</h1>
        
        <div class="order-summary">
            <div class="summary-header" id="customer-info">Loading order...</div>
            <div id="items-list"></div>
            <div class="total-row">
                <span>Total</span>
                <span id="display-total">$0.00</span>
            </div>
        </div>

        <div id="i4goFrame"></div>
    </div>

    <div id="success-ui">
        <div class="success-icon">✓</div>
        <h1>Order Received</h1>
        <p>Your transaction was successful. Thank you!</p>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('id');

    async function initializeCheckout() {
        if (!orderId) {
            document.getElementById('customer-info').innerText = "Error: No Order ID provided.";
            return;
        }

        try {
            // SCENARIO A: Fetch Access Block and Order Details
            const response = await fetch(`https://hook.us2.make.com/lq54xriqlh8eyrsiihc58i5ga4kc45ry?id=${orderId}`);
            const data = await response.json();

            // 1. Update UI with Order Data
            document.getElementById('customer-info').innerText = `Order for ${data.customerName || 'Guest'}`;
            document.getElementById('display-total').innerText = `$${(data.totalAmount / 100).toFixed(2)}`;

            // Build Receipt List
            let itemsHtml = '';
            const orderItems = typeof data.items === 'string' ? JSON.parse(data.items) : data.items;
            
            if (orderItems && orderItems.lineItems) {
                orderItems.lineItems.forEach(item => {
                    itemsHtml += `
                        <div class="item-row">
                            <span>${item.quantity}x ${item.name}</span>
                            <span>$${(item.total / 100).toFixed(2)}</span>
                        </div>`;
                });
                document.getElementById('items-list').innerHTML = itemsHtml;
            }

            // 2. Initialize i4Go iFrame
            $("#i4goFrame").i4goTrueToken({
                url: data.i4goUrl,
                server: data.i4goServer,
                accessBlock: data.accessBlock,
                template: "bootstrap4",
                submitButton: { label: "Pay Now" },
                self: document.location, // Mandatory Handshake
                frameAutoResize: true,
                onSuccess: function(form, response) {
                    // Hide UI
                    document.getElementById('payment-ui').style.display = 'none';
                    document.getElementById('success-ui').style.display = 'block';

                    // 3. Format Legacy Expiration (MMYY)
                    let month = (response.i4go_expirationmonth || "").toString().padStart(2, '0');
                    let year = (response.i4go_expirationyear || "").toString().slice(-2);
                    let formattedExp = (month && year) ? (month + year) : "";

                    // SCENARIO B: Send for Final Charge
                    fetch('https://hook.us2.make.com/998kdfnczir9vgihp4wbny8ollf80px1', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            tokenId: response.i4go_uniqueid,
                            expirationDate: formattedExp,
                            totalAmount: data.totalAmount, // Sends as 2198 (Pennies)
                            invoiceId: orderId
                        })
                    });
                },
                onFailure: function(form, response) {
                    alert("Card Declined: " + (response.i4go_responsetext || "Unknown Error"));
                }
            });

        } catch (err) {
            console.error("Initialization Failed:", err);
            document.getElementById('customer-info').innerText = "Unable to load order. Please refresh.";
        }
    }

    initializeCheckout();
</script>

</body>
</html>
