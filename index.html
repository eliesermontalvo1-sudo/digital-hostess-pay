<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | Digital Hostess</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://i4m.shift4test.com/js/jquery.i4goTrueToken.js"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f9f9f9; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 450px; width: 100%; text-align: center; }
        h1 { font-size: 24px; color: #1a1a1a; margin-bottom: 8px; }
        .amount { font-size: 32px; font-weight: bold; margin: 20px 0; color: #2ecc71; }
        /* This is the container where Shift4 will build your secure form [cite: 723] */
        #i4goFrame { width: 100%; min-height: 350px; margin-top: 20px; border-radius: 8px; overflow: hidden; }
        .loading { color: #888; font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <h1>Complete Your Order</h1>
    <p id="customer-name" class="loading">Loading order details...</p>
    <div id="order-total" class="amount">$0.00</div>
    
    <div id="i4goFrame"></div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('id');

    async function loadOrder() {
        if (!orderId) {
            document.body.innerHTML = "<h1>Error: No order ID found.</h1>";
            return;
        }

        try {
            // 1. Fetch the order and Shift4 credentials from your Make.com Webhook
            const response = await fetch(`https://hook.us2.make.com/lq54xriqlh8eyrsiihc58i5ga4kc45ry?id=${orderId}`);
            const data = await response.json();

            // 2. Update the UI with Customer Data
            document.getElementById('customer-name').innerText = `For ${data.customerName}`;
            document.getElementById('order-total').innerText = `$${(data.totalAmount / 100).toFixed(2)}`;
            document.getElementById('customer-name').classList.remove('loading');

            // 3. Initialize the Shift4 Secure Form [cite: 535, 540]
            $("#i4goFrame").i4goTrueToken({
                url: data.i4goUrl,            // The i4m server URL from Make [cite: 464, 536]
                server: data.i4goServer,      // The payment server from Make [cite: 538]
                accessBlock: data.accessBlock, // Your generated security key [cite: 450, 540]
                template: "bootstrap4",       // Ensures the payment form shows instead of welcome text [cite: 452, 542]
                self: document.location,      // Required for domain verification [cite: 451, 540]
                frameAutoResize: true,        // Automatically adjusts height to fit the form [cite: 578]
                
                onSuccess: function(form, response) {
                    console.log("Success! Token received:", response.i4go_uniqueid);
                    alert("Payment Info Secured! Ready for final charge.");
                },
                onFailure: function(form, response) {
                    console.error("Shift4 Error:", response.i4go_responsetext);
                    alert("Payment Error: " + response.i4go_responsetext);
                }
            });

        } catch (error) {
            console.error("Failed to load order:", error);
            document.getElementById('customer-name').innerText = "Error loading order.";
        }
    }

    loadOrder();
</script>

</body>
</html>
